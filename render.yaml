services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: student-store-api
    runtime: node
    rootDir: student-store-api
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: student-store-db
          property: connectionString
      # Set FRONTEND_URL so the backend's CORS config can allow the UI origin
      - key: FRONTEND_URL
        fromService:
          name: student-store-ui
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # ── Frontend (Vite static site) ────────────────────────────────────────────
  - type: web
    name: student-store-ui
    runtime: static
    rootDir: student-store-ui
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Automatically resolves to https://student-store-api.onrender.com at build time
      - key: VITE_API_URL
        fromService:
          name: student-store-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      # Send all routes to index.html so React Router handles them client-side
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL database ────────────────────────────────────────────────────
databases:
  - name: student-store-db
    databaseName: student_store
    plan: free
